<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông Tin Sinh Viên</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background blobs */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: blobFloat 8s ease-in-out infinite alternate;
            pointer-events: none;
        }
        body::before {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #6c63ff, #3b2fdb);
            top: -100px; left: -100px;
        }
        body::after {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #ff6584, #e040fb);
            bottom: -80px; right: -80px;
            animation-delay: -4s;
        }

        @keyframes blobFloat {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 20px) scale(1.1); }
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 48px 44px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
            position: relative;
            z-index: 1;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .card-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #6c63ff, #e040fb);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 16px;
            box-shadow: 0 8px 24px rgba(108, 99, 255, 0.4);
        }

        h2 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.45);
            margin-top: 6px;
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            pointer-events: none;
            opacity: 0.6;
        }

        input[type="text"],
        input[type="number"],
        input[type="email"] {
            width: 100%;
            padding: 13px 14px 13px 42px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="text"]::placeholder,
        input[type="number"]::placeholder,
        input[type="email"]::placeholder {
            color: rgba(255,255,255,0.25);
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="email"]:focus {
            background: rgba(108, 99, 255, 0.12);
            border-color: #6c63ff;
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.2);
        }

        .btn-save {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6c63ff, #e040fb);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 24px rgba(108, 99, 255, 0.45);
            margin-top: 8px;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 32px rgba(108, 99, 255, 0.6);
            filter: brightness(1.1);
        }

        .btn-save:active {
            transform: translateY(0);
        }

        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #6c63ff;
        }

        .back-link::before {
            content: '←';
            font-size: 1rem;
        }

        /* Remove number input arrows */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <div class="card-icon">🎓</div>
        <h2>Thông Tin Sinh Viên</h2>
        <p class="subtitle">Điền đầy đủ thông tin để lưu hồ sơ sinh viên</p>
    </div>

    <form th:action="@{/students/save}" th:object="${student}" method="post">
        <input type="hidden" th:field="*{id}"/>

        <div class="form-group">
            <label for="name">Họ và Tên</label>
            <div class="input-wrapper">
                <span class="input-icon">👤</span>
                <input type="text" id="name" th:field="*{name}" placeholder="Nhập họ tên đầy đủ" required/>
            </div>
        </div>

        <div class="form-group">
            <label for="age">Tuổi</label>
            <div class="input-wrapper">
                <span class="input-icon">🎂</span>
                <input type="number" id="age" th:field="*{age}" placeholder="Nhập tuổi" min="1" max="100" required/>
            </div>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <div class="input-wrapper">
                <span class="input-icon">✉️</span>
                <input type="email" id="email" th:field="*{email}" placeholder="example@email.com" required/>
            </div>
        </div>

        <button type="submit" class="btn-save">💾 Lưu Thông Tin</button>
    </form>

    <a href="/students" class="back-link">Quay lại danh sách</a>
</div>

</body>
</html>
